<!DOCTYPE html>
<html lang="en">

<head>
    <title>Patient Login</title>
</head>

<body>
    <center>
        <h2 style="color:green;">Patient Login</h2>
    </center>
    <form name="login" action="/submit_login" method="post">
          <table frame="box" rules="none" cellpadding="15" align="center"> <br>
            <caption><b>Enter your credentials to login</b></caption>
            <tr>
                <td>
                    <label for="email"><b>Email:</b></label>
                </td>
                <td>
                    <input type="email" id="email" name="email" placeholder="Enter your Email"> <br>
                </td>
            <tr>
                <td>
                    <label for="password"><b>Password:</b></label>
                </td>
                <td>
                    <input type="password" id="password" name="password" placeholder="Enter your Password"> <br>
                </td>
            </tr>
              
              <tr>
                <td colspan="2" align="center">
                    <input type="checkbox" id="remember" name="remember" value="Remember me"> <label for="remember">Remember me</label>  <br><br>
                    <input type="submit" value="Login"> <br><br>
                    <a href="index.html">⬅ Back to Home</a>
                </td>
            </tr>
           
        </table>
    </form>
</body>

</html>
