<!DOCTYPE html>
<html lang="en">

<head>
    <title>Doctor Registration Form</title>
</head>

<body>
    <center>
        <h2 style="color:green;">Doctor Registration Form</h2>
    </center>
    <form>
          <table frame="box" rules="none" cellpadding="15" align="center">
            <tr>
                <td>
                    <label><b>Name:</b></label>
                </td>
                <td>
                    <input type="text"> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label><b>Password:</b></label>
                </td>
                <td>
                    <input type="password"> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label><b>Email:</b></label>
                </td>
                <td>
                    <input type="email"> <br>
                </td>
            </tr>
            <tr>
                <td>
                    <label><b>Phone Number:</b></label>
                </td>
                <td>
                    <input type="number"> <br>

                </td>
            </tr>

            <tr>
                <td>
                    <label><b>Specialization:</b></label>
                </td>
                <td>
                    <select>
                        <option value="Cardiology">Cardiology</option>
                        <option value="Dermatology">Dermatology</option>
                        <option value="Neurology">Neurology</option>
                        <option value="Pediatrics">Pediatrics</option>
                        <option value="Psychiatry">Psychiatry</option>
                        <option value="Radiology">Radiology</option>
                        <option value="Surgery">Surgery</option>
                        <option value="Urology">Urology</option>
                    </select> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label><b>Experience(years):</b></label>

                </td>
                <td>
                    <input type="number" min="0"> <br>

                </td>
            </tr>
            <tr>
                <td>
                    <label><b>Gender:</b></label>
                </td>
                <td>
                    <input type="radio" value="Male"> Male
                    <input type="radio" value="Female"> Female <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label><b>Available Days:</b></label>

                </td>
                <td>
                    <input type="checkbox" value="Monday"> Monday
                    <input type="checkbox" value="Tuesday"> Tuesday
                    <input type="checkbox" value="Wednesday"> Wednesday <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label><b>Available Time:</b></label>
                </td>
                <td>
                    <input type="time"> <br>
                </td>
            </tr>
            <tr>
                <td>
                    <label><b> Address:</b></label><br>
                </td>
                <td>
                    <textarea rows="4" cols="30"></textarea>
                    <br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label><b>Upload Certificate:</b></label>
                </td>
                <td>
                    <input type="file"> <br>
                </td>
            </tr>

              <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Register">
                    <input type="reset" value="Clear">  <br><br>
                    <a href="index.html">⬅ Back to Home</a>
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
