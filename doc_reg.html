<!DOCTYPE html>
<html lang="en">

<head>
    <title>Doctor Registration Form</title>
</head>

<body>
    <center>
        <h2 style="color:green;">Doctor Registration Form</h2>
    </center>
    <form name="registration" action="/submit_registration" method="post">
          <table frame="box" rules="none" cellpadding="15" align="center"> <br>
            <caption><b>Fill in the details to register</b></caption>
            <tr>
                <td>
                    <label for="id1"><b>Name:</b></label>
                </td>
                <td>
                    <input type="text" id="id1" name="n1" placeholder="Enter your Name"> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="id2"><b>Password:</b></label>
                </td>
                <td>
                    <input type="password" id="id2" name="n2" placeholder="Enter your Password"> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="id4"><b>Email:</b></label>
                </td>
                <td>
                    <input type="email" id="id4" name="n4" placeholder="Enter your Email"> <br>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="id5"><b>Phone Number:</b></label>
                </td>
                <td>
                    <input type="number" id="id5" name="n5" placeholder="Enter your Phone Number"> <br>

                </td>
            </tr>

            <tr>
                <td>
                    <label for="id6"><b>Specialization:</b></label>
                </td>
                <td>
                    <select id="id6" name="n6">
                        <option value="Cardiology">Cardiology</option>
                        <option value="Dermatology">Dermatology</option>
                        <option value="Neurology">Neurology</option>
                        <option value="Pediatrics">Pediatrics</option>
                        <option value="Psychiatry">Psychiatry</option>
                        <option value="Radiology">Radiology</option>
                        <option value="Surgery">Surgery</option>
                        <option value="Urology">Urology</option>
                    </select> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="id7"><b>Experience(years):</b></label>

                </td>
                <td>
                    <input type="number" min="0" id="id7" name="n7" placeholder="Enter your Experience"> <br>

                </td>
            </tr>
            <tr>
                <td>
                     <label for="id8"><b>Gender:</b></label>
                </td>
                <td>
                    <input type="radio" id="id8" name="n8" value="Male"> <label for="id8">Male</label>
                    <input type="radio" id="id9" name="n9" value="Female"> <label for="id9">Female</label> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="id10"><b>Available Days:</b></label>

                </td>
                <td>
                    <input type="checkbox" id="id10" name="n10" value="Monday"> <label for="id10">Monday</label>
                    <input type="checkbox" id="id11" name="n11" value="Tuesday"> <label for="id11">Tuesday</label>
                    <input type="checkbox" id="id12" name="n12" value="Wednesday"> <label for="id12">Wednesday</label> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="id13"><b>Available Time:</b></label>
                </td>
                <td>
                    <input type="time" id="id13" name="n13"> <br>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="id14"><b> Address:</b></label><br>
                </td>
                <td>
                    <textarea rows="4" cols="30" id="id14" name="n14" placeholder="Enter your Address"></textarea>
                    <br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="id15"><b>Upload Certificate:</b></label>
                </td>
                <td>
                    <input type="file" id="id15" name="n15"> <br>
                </td>
            </tr>

              <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Register">
                    <input type="reset" value="Clear">  <br><br>
                    <a href="index.html">⬅ Back to Home</a>
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
