<!DOCTYPE html>
<html lang="en">

<head>
    <title>Patient Registration Form</title>
</head>

<body>
    <center>
        <h2 style="color:green;">Patient Registration Form</h2>
    </center>
    <form name="registration" action="/submit_registration" method="post">
          <table frame="box" rules="none" cellpadding="15" align="center"> <br>
            <caption><b>Fill in the details to register</b></caption>
            <tr>
                <td>
                    <label for="name"><b>Name:</b></label>
                </td>
                <td>
                    <input type="text" id="name" name="name" placeholder="Enter your Name"> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="password"><b>Password:</b></label>
                </td>
                <td>
                    <input type="password" id="password" name="password" placeholder="Enter your Password"> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="email"><b>Email:</b></label>
                </td>
                <td>
                    <input type="email" id="email" name="email" placeholder="Enter your Email"> <br>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="phone"><b>Phone Number:</b></label>
                </td>
                <td>
                    <input type="number" id="phone" name="phone" placeholder="Enter your Phone Number"> <br>

                </td>
            </tr>
            <tr>
                <td>
                    <label for="dob"><b>Date of Birth:</b></label>
                </td>
                <td>
                    <input type="date" id="dob" name="dob"> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="appointment"><b>Appointment Date & Time:</b></label>
                </td>
                <td>
                    <input type="datetime-local" id="appointment" name="appointment"> <br>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="male"><b>Gender:</b></label>
                </td>
                <td>
                    <input type="radio" id="male" name="gender" value="Male"> <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="Female"> <label for="female">Female</label> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="diabetes"><b>Diseases:</b></label>
                </td>
                <td>
                    <input type="checkbox" id="diabetes" name="diseases" value="Diabetes"> <label for="diabetes">Diabetes</label>
                    <input type="checkbox" id="hypertension" name="diseases" value="Hypertension"> <label for="hypertension">Hypertension</label>
                    <input type="checkbox" id="heartdisease" name="diseases" value="Heart Disease"> <label for="heartdisease">Heart Disease</label>
                    <input type="checkbox" id="allergy" name="diseases" value="Allergy"> <label for="allergy">Allergy</label>
                    <input type="checkbox" id="arthritis" name="diseases" value="Arthritis"> <label for="arthritis">Arthritis</label>
                    <input type="checkbox" id="depression" name="diseases" value="Depression"> <label for="depression">Depression</label>
                    <input type="checkbox" id="asthma" name="diseases" value="Asthma"> <label for="asthma">Asthma</label> <br>
                </td>
            </tr>



            <tr>
                <td>
                    <label for="bloodgroup"><b> Blood Group:</b></label>
                </td>
                <td>
                    <select id="bloodgroup" name="bloodgroup">
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select> <br>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="address"><b> Address:</b></label><br>
                </td>
                <td>
                    <textarea rows="4" cols="30" id="address" name="address"></textarea>
                    <br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="report"><b>Upload Report:</b></label>
                </td>
                <td>
                    <input type="file" id="report" name="report"> <br>
                </td>
            </tr>

              <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Register">
                    <input type="reset" value="Clear">  <br><br>
                    <a href="index.html">⬅ Back to Home</a>
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
