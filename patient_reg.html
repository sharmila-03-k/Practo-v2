<!DOCTYPE html>
<html lang="en">

<head>
    <title>Patient Registration Form</title>
</head>

<body>
    <center>
        <h2 style="color:green;">Patient Registration Form</h2>
    </center>
    <form>
          <table frame="box" rules="none" cellpadding="15" align="center">
            <tr>
                <td>
                    <label><b>Name:</b></label>
                </td>
                <td>
                    <input type="text"> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label><b>Password:</b></label>
                </td>
                <td>
                    <input type="password"> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label><b>Email:</b></label>
                </td>
                <td>
                    <input type="email"> <br>
                </td>
            </tr>
            <tr>
                <td>
                    <label><b>Phone Number:</b></label>
                </td>
                <td>
                    <input type="number"> <br>

                </td>
            </tr>
            <tr>
                <td>
                    <label><b>Date of Birth:</b></label>
                </td>
                <td>
                    <input type="date"> <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label><b>Appointment Date & Time:</b></label>
                </td>
                <td>
                    <input type="datetime-local"> <br>
                </td>
            </tr>
            <tr>
                <td>
                    <label><b>Gender:</b></label>
                </td>
                <td>
                    <input type="radio" value="Male"> Male
                    <input type="radio" value="Female"> Female <br>
                </td>
            </tr>

            <tr>
                <td>
                    <label><b>Diseases:</b></label>
                </td>
                <td>
                    <input type="checkbox" value="Diabetes"> Diabetes
                    <input type="checkbox" value="Hypertension"> Hypertension
                    <input type="checkbox" value="Heart Disease"> Heart Disease
                     <input type="checkbox" value="Allergy"> Allergy
                        <input type="checkbox" value="Arthritis"> Arthritis
                        <input type="checkbox" value="Depression"> Depression
                    <input type="checkbox" value="Asthma"> Asthma <br>
                </td>
            </tr>



            <tr>
                <td>
                    <label><b> Blood Group:</b></label>
                </td>
                <td>
                    <select>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select> <br>
                </td>
            </tr>
            <tr>
                <td>
                    <label><b> Address:</b></label><br>
                </td>
                <td>
                    <textarea rows="4" cols="30"></textarea>
                    <br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label><b>Upload Report:</b></label>
                </td>
                <td>
                    <input type="file"> <br>
                </td>
            </tr>

              <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Register">
                    <input type="reset" value="Clear">  <br><br>
                    <a href="index.html">⬅ Back to Home</a>
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
